<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODO App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    h1 {
      color: rgba(255, 255, 255, 0.85);
      font-size: 72px;
      font-weight: 200;
      letter-spacing: 16px;
      text-transform: lowercase;
      margin-bottom: 32px;
    }

    .card {
      width: 100%;
      max-width: 560px;
      border-radius: 4px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    /* ── Add input ─────────────────────────────────────────────────────────── */

    .add-row {
      display: flex;
      align-items: center;
      background: #fff;
      border-radius: 4px 4px 0 0;
      padding: 0 16px;
      gap: 12px;
    }

    .toggle-all-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 22px;
      color: #ccc;
      padding: 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .toggle-all-btn:hover,
    .toggle-all-btn.all-done { color: #737373; }

    #new-todo {
      flex: 1;
      border: none;
      outline: none;
      font-size: 24px;
      font-style: italic;
      color: #333;
      padding: 18px 0;
      background: transparent;
    }

    #new-todo::placeholder { color: #ccc; font-style: italic; }

    /* ── Todo list ─────────────────────────────────────────────────────────── */

    #todo-list {
      list-style: none;
      background: #fff;
      border-top: 1px solid #ededed;
    }

    .todo-item {
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid #ededed;
      gap: 12px;
      min-height: 60px;
      animation: slideIn 0.15s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item:last-child { border-bottom: none; }

    /* custom checkbox */
    .check-wrap {
      position: relative;
      flex-shrink: 0;
      width: 28px;
      height: 28px;
    }

    .check-wrap input[type="checkbox"] {
      opacity: 0;
      position: absolute;
      inset: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
      margin: 0;
    }

    .check-circle {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid #d9d9d9;
      transition: border-color 0.2s, background 0.2s;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .check-circle svg {
      opacity: 0;
      transition: opacity 0.15s;
    }

    .check-wrap input:checked ~ .check-circle {
      border-color: #5dc2af;
      background: radial-gradient(circle, #5dc2af 0%, #4aab99 100%);
    }

    .check-wrap input:checked ~ .check-circle svg { opacity: 1; }

    .todo-label {
      flex: 1;
      font-size: 24px;
      color: #4d4d4d;
      line-height: 1.3;
      transition: color 0.2s;
      word-break: break-word;
      cursor: pointer;
    }

    .todo-label.done {
      color: #d9d9d9;
      text-decoration: line-through;
    }

    .edit-input {
      flex: 1;
      font-size: 24px;
      color: #4d4d4d;
      border: 1px solid #999;
      border-radius: 3px;
      padding: 6px 10px;
      outline: none;
      box-shadow: inset 0 -2px 0 #5dc2af;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 24px;
      color: #cc9a9a;
      opacity: 0;
      transition: color 0.2s, opacity 0.2s;
      line-height: 1;
      padding: 4px 6px;
      flex-shrink: 0;
    }

    .todo-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: #af5b5e; }

    /* ── Footer ────────────────────────────────────────────────────────────── */

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      padding: 10px 16px;
      border-top: 1px solid #ededed;
      font-size: 14px;
      color: #777;
      border-radius: 0 0 4px 4px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .items-left { min-width: 80px; }

    .filters {
      display: flex;
      gap: 6px;
    }

    .filter-btn {
      background: none;
      border: 1px solid transparent;
      border-radius: 3px;
      padding: 4px 10px;
      cursor: pointer;
      color: inherit;
      font-size: 14px;
      transition: border-color 0.15s;
    }

    .filter-btn:hover { border-color: rgba(175, 47, 47, 0.2); }

    .filter-btn.active {
      border-color: rgba(175, 47, 47, 0.35);
      color: #555;
    }

    .clear-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #777;
      font-size: 14px;
      min-width: 80px;
      text-align: right;
      transition: color 0.2s;
    }

    .clear-btn:hover { color: #333; text-decoration: underline; }

    /* ── Empty state ───────────────────────────────────────────────────────── */

    .empty-state {
      background: #fff;
      padding: 40px;
      text-align: center;
      color: #bbb;
      font-size: 18px;
      border-top: 1px solid #ededed;
    }

    /* ── Error toast ───────────────────────────────────────────────────────── */

    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #e74c3c;
      color: #fff;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      transition: transform 0.3s ease;
      z-index: 100;
      white-space: nowrap;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Stack shadow decorations (TodoMVC style) ──────────────────────────── */

    .stack-shadow {
      position: relative;
      width: 100%;
      max-width: 560px;
    }

    .stack-shadow::after,
    .stack-shadow::before {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      width: calc(100% - 20px);
      height: 4px;
      background: rgba(255,255,255,0.7);
      border-radius: 0 0 4px 4px;
      transform: translateX(-50%);
    }

    .stack-shadow::before {
      bottom: -8px;
      width: calc(100% - 40px);
      background: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>

  <h1>todos</h1>

  <div class="stack-shadow">
    <div class="card">

      <!-- Add new todo -->
      <div class="add-row">
        <button class="toggle-all-btn" id="toggle-all-btn" title="Mark all complete" onclick="toggleAll()">❯</button>
        <input
          id="new-todo"
          type="text"
          placeholder="What needs to be done?"
          maxlength="200"
          autofocus
          autocomplete="off"
        />
      </div>

      <!-- Todo list -->
      <ul id="todo-list"></ul>

      <!-- Footer -->
      <div class="footer" id="footer" style="display:none;">
        <span class="items-left" id="items-left">0 items left</span>
        <div class="filters">
          <button class="filter-btn active" data-filter="all"       onclick="setFilter('all',this)">All</button>
          <button class="filter-btn"        data-filter="active"    onclick="setFilter('active',this)">Active</button>
          <button class="filter-btn"        data-filter="completed" onclick="setFilter('completed',this)">Completed</button>
        </div>
        <button class="clear-btn" id="clear-btn" onclick="clearCompleted()">Clear completed</button>
      </div>

    </div>
  </div>

  <div id="toast"></div>

  <script>
    const BACKEND = "{{ backend_url }}";

    let todos   = [];
    let filter  = "all";
    let editingId = null;

    // ── API helpers ──────────────────────────────────────────────────────────

    async function api(method, path, body) {
      try {
        const res = await fetch(BACKEND + path, {
          method,
          headers: body ? { "Content-Type": "application/json" } : {},
          body:    body ? JSON.stringify(body) : undefined,
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `HTTP ${res.status}`);
        }
        return res.status === 204 ? null : res.json();
      } catch (e) {
        showToast(e.message || "Network error");
        throw e;
      }
    }

    // ── Data operations ──────────────────────────────────────────────────────

    async function loadTodos() {
      try {
        todos = await api("GET", "/todos");
        render();
      } catch (_) {}
    }

    async function addTodo(text) {
      const todo = await api("POST", "/todos", { text });
      todos.push(todo);
      render();
    }

    async function toggleTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (!todo) return;
      const updated = await api("PUT", `/todos/${id}`, { completed: !todo.completed });
      Object.assign(todo, updated);
      render();
    }

    async function saveTodoText(id, text) {
      if (!text.trim()) { cancelEdit(); return; }
      const updated = await api("PUT", `/todos/${id}`, { text: text.trim() });
      Object.assign(todos.find(t => t.id === id), updated);
      editingId = null;
      render();
    }

    async function deleteTodo(id) {
      await api("DELETE", `/todos/${id}`);
      todos = todos.filter(t => t.id !== id);
      render();
    }

    async function clearCompleted() {
      const completed = todos.filter(t => t.completed);
      await Promise.all(completed.map(t => api("DELETE", `/todos/${t.id}`)));
      todos = todos.filter(t => !t.completed);
      render();
    }

    async function toggleAll() {
      const allDone = todos.every(t => t.completed);
      await Promise.all(todos.map(t =>
        api("PUT", `/todos/${t.id}`, { completed: !allDone })
          .then(u => Object.assign(t, u))
      ));
      render();
    }

    // ── Rendering ────────────────────────────────────────────────────────────

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      if (btn) btn.classList.add("active");
      render();
    }

    function render() {
      const list   = document.getElementById("todo-list");
      const footer = document.getElementById("footer");
      const toggleBtn = document.getElementById("toggle-all-btn");

      const visible = todos.filter(t =>
        filter === "all"       ? true :
        filter === "active"    ? !t.completed :
        /* completed */           t.completed
      );

      const activeCount    = todos.filter(t => !t.completed).length;
      const completedCount = todos.filter(t =>  t.completed).length;
      const allDone        = todos.length > 0 && activeCount === 0;

      // toggle-all styling
      toggleBtn.classList.toggle("all-done", allDone);
      toggleBtn.style.visibility = todos.length ? "visible" : "hidden";

      // footer
      if (todos.length > 0) {
        footer.style.display = "flex";
        document.getElementById("items-left").textContent =
          `${activeCount} item${activeCount !== 1 ? "s" : ""} left`;
        const clearBtn = document.getElementById("clear-btn");
        clearBtn.style.visibility = completedCount > 0 ? "visible" : "hidden";
      } else {
        footer.style.display = "none";
      }

      // list items
      if (visible.length === 0 && todos.length === 0) {
        list.innerHTML = `<div class="empty-state">No todos yet — add one above!</div>`;
        return;
      }

      if (visible.length === 0) {
        list.innerHTML = `<div class="empty-state">Nothing here.</div>`;
        return;
      }

      list.innerHTML = visible.map(todo => {
        const isEditing = todo.id === editingId;
        return `
          <li class="todo-item" data-id="${todo.id}">
            <label class="check-wrap">
              <input type="checkbox" ${todo.completed ? "checked" : ""}
                onchange="toggleTodo('${todo.id}')" />
              <span class="check-circle">
                <svg width="14" height="10" viewBox="0 0 14 10" fill="none">
                  <polyline points="1.5,5 5,8.5 12.5,1.5" stroke="white" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
            </label>
            ${isEditing
              ? `<input class="edit-input" id="edit-${todo.id}" value="${escHtml(todo.text)}"
                   onblur="saveTodoText('${todo.id}', this.value)"
                   onkeydown="onEditKey(event, '${todo.id}')"
                   autofocus />`
              : `<span class="todo-label ${todo.completed ? "done" : ""}"
                   ondblclick="startEdit('${todo.id}')"
                   title="Double-click to edit">${escHtml(todo.text)}</span>`
            }
            <button class="delete-btn" onclick="deleteTodo('${todo.id}')" title="Delete">✕</button>
          </li>`;
      }).join("");

      // focus the edit input if needed
      if (editingId) {
        const inp = document.getElementById(`edit-${editingId}`);
        if (inp) { inp.focus(); inp.select(); }
      }
    }

    // ── Edit helpers ─────────────────────────────────────────────────────────

    function startEdit(id) {
      editingId = id;
      render();
    }

    function cancelEdit() {
      editingId = null;
      render();
    }

    function onEditKey(e, id) {
      if (e.key === "Enter")  saveTodoText(id, e.target.value);
      if (e.key === "Escape") cancelEdit();
    }

    // ── New-todo input ────────────────────────────────────────────────────────

    document.getElementById("new-todo").addEventListener("keydown", e => {
      if (e.key !== "Enter") return;
      const text = e.target.value.trim();
      if (!text) return;
      e.target.value = "";
      addTodo(text);
    });

    // ── Misc helpers ─────────────────────────────────────────────────────────

    function escHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove("show"), 3500);
    }

    // ── Boot ─────────────────────────────────────────────────────────────────

    loadTodos();
  </script>
</body>
</html>
